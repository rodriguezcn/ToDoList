<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Tareas Avanzado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="estilo.css">
</head>
<body class="bg-light">

    <div id="pantalla-inicio-sesion" class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="card shadow-lg p-4 style-container" style="max-width: 400px; width: 100%;">
            <div class="text-center mb-4">
                <i class="bi bi-shield-lock-fill text-secondary" style="font-size: 3rem;"></i>
                <h3 class="mt-2">Iniciar Sesión</h3>
            </div>
            <form id="formulario-inicio-sesion">
                <div class="mb-3">
                    <label for="input-usuario" class="form-label">Usuario</label>
                    <input type="text" class="form-control" id="input-usuario" required placeholder="Ingresa tu usuario">
                </div>
                <div class="mb-3">
                    <label for="input-contrasenia" class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="input-contrasenia" required placeholder="Ingresa tu contraseña">
                </div>
                <div id="error-inicio-sesion" class="alert alert-danger d-none p-2 small text-center" role="alert">
                    Usuario o contraseña incorrectos.
                </div>
                <button type="submit" class="btn btn-dark w-100 mb-2">Ingresar</button>
                <button type="button" id="boton-registrarse" class="btn btn-outline-secondary w-100">Crear Usuario</button>
            </form>
        </div>
    </div>

    <div id="pantalla-principal" class="d-none">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
            <div class="container">
                <a class="navbar-brand" href="#"><i class="bi bi-check2-square me-2"></i>ToDo-List</a>
                <div class="d-flex align-items-center">
                    <span class="text-white me-3" id="mensaje-bienvenida"></span>
                    <button class="btn btn-secondary rounded-circle btn-sm" title="Cerrar sesión" id="boton-cerrar-sesion"><i class="bi bi-box-arrow-right"></i></button>
                </div>
            </div>
        </nav>

        <div class="container">
            <div class="d-flex justify-content-start mb-3">
                <button class="btn btn-mi-color btn-lg shadow-sm" id="boton-abrir-modal-agregar">
                    <i class="bi bi-plus-circle me-2"></i>Agregar Tarea
                </button>
            </div>

            <div class="accordion mb-4" id="acordeon-filtros">
                <div class="accordion-item shadow-sm">
                    <h2 class="accordion-header" id="encabezado-filtros">
                        <button class="accordion-button collapsed bg-light fw-bold" type="button" data-bs-toggle="collapse" data-bs-target="#colapso-filtros" aria-expanded="false" aria-controls="colapso-filtros">
                            <i class="bi bi-funnel-fill me-2"></i> Activar filtros para búsqueda de tareas
                        </button>
                    </h2>
                    <div id="colapso-filtros" class="accordion-collapse collapse" aria-labelledby="encabezado-filtros" data-bs-parent="#acordeon-filtros">
                        <div class="accordion-body bg-white">
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label for="filtro-titulo" class="form-label small fw-bold">Título</label>
                                    <input type="text" class="form-control form-control-sm" id="filtro-titulo" placeholder="Ingresar título">
                                </div>
                                <div class="col-md-4">
                                    <label for="filtro-etiqueta" class="form-label small fw-bold">Tag (Etiqueta)</label>
                                    <input type="text" class="form-control form-control-sm" id="filtro-etiqueta" placeholder="Ingresar etiqueta">
                                </div>
                                <div class="col-md-4">
                                    <label for="filtro-estado" class="form-label small fw-bold">Estado</label>
                                    <select class="form-select form-select-sm" id="filtro-estado">
                                        <option value="todos">Todos los estados</option>
                                        <option value="Pendiente">Pendiente</option>
                                        <option value="En Proceso">En Proceso</option>
                                        <option value="Pausada">Pausada</option>
                                        <option value="Finalizada">Finalizada</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label for="filtro-fecha-creacion" class="form-label small fw-bold">Fecha de creación</label>
                                    <input type="date" class="form-control form-control-sm" id="filtro-fecha-creacion">
                                </div>
                                <div class="col-md-4">
                                    <label for="filtro-fecha-modificacion" class="form-label small fw-bold">Fecha de modificación</label>
                                    <input type="date" class="form-control form-control-sm" id="filtro-fecha-modificacion">
                                </div>
                                <div class="col-md-4">
                                    <label for="filtro-usuario" class="form-label small fw-bold">Usuario (Creador)</label>
                                    <input type="text" class="form-control form-control-sm" id="filtro-usuario" placeholder="Nombre de usuario">
                                </div>
                            </div>
                            <div class="d-flex justify-content-end mt-3">
                                <button class="btn btn-sm btn-outline-secondary" id="boton-limpiar-filtros">Limpiar Filtros</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm mb-5">
                <div class="card-header bg-light d-flex justify-content-between align-items-center py-3">
                    <h5 class="mb-0 fw-bold"><i class="bi bi-list-task me-2"></i>Mis Tareas</h5>
                    <span class="badge bg-secondary fs-6" id="contador-tareas">0 tareas</span>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-dark">
                                <tr>
                                    <th scope="col" style="cursor: pointer; user-select: none;" onclick="ordenarPor('titulo')">
                                        Título <i class="bi bi-arrow-down-up ms-1 small text-secondary"></i>
                                    </th>
                                    <th scope="col" style="cursor: pointer; user-select: none;" onclick="ordenarPor('tag')">
                                        Tag <i class="bi bi-arrow-down-up ms-1 small text-secondary"></i>
                                    </th>
                                    <th scope="col" style="cursor: pointer; user-select: none;" onclick="ordenarPor('estado')">
                                        Estado <i class="bi bi-arrow-down-up ms-1 small text-secondary"></i>
                                    </th>
                                    <th scope="col" style="cursor: pointer; user-select: none;" onclick="ordenarPor('id_usuario')">
                                        Creador <i class="bi bi-arrow-down-up ms-1 small text-secondary"></i>
                                    </th>
                                    <th scope="col" style="cursor: pointer; user-select: none;" onclick="ordenarPor('fecha_creacion')">
                                        Creación <i class="bi bi-arrow-down-up ms-1 small text-secondary"></i>
                                    </th>
                                    <th scope="col" style="cursor: pointer; user-select: none;" onclick="ordenarPor('fecha_modificacion')">
                                        Modificación <i class="bi bi-arrow-down-up ms-1 small text-secondary"></i>
                                    </th>
                                    <th scope="col" class="text-end px-3">Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="cuerpo-tabla-tareas">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modal-tarea" data-bs-backdrop="static" tabindex="-1" aria-labelledby="etiqueta-modal-tarea" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-secondary text-white">
                    <h5 class="modal-title" id="etiqueta-modal-tarea">Nueva Tarea</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                    <form id="formulario-tarea">
                        <input type="hidden" id="campo-id-tarea">        

                        <div class="mb-3 d-none" id="contenedor-fecha-creacion">
                            <label for="campo-fecha-creacion" class="form-label fw-bold small text-muted">Fecha de Creación</label>
                            <input type="text" class="form-control bg-light text-muted" id="campo-fecha-creacion" readonly>
                        </div>

                        <div class="mb-3">
                            <label for="campo-titulo" class="form-label fw-bold small">Título</label>
                            <input type="text" class="form-control" id="campo-titulo" placeholder="Agregar título de la tarea" required>
                        </div>
                        <div class="mb-3">
                            <label for="campo-descripcion" class="form-label fw-bold small">Descripción</label>
                            <textarea class="form-control" id="campo-descripcion" rows="3" placeholder="Agregar descripción de la tarea (max. 300 caracteres)" required maxlength="300"></textarea>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label for="campo-etiqueta" class="form-label fw-bold small">Tag (Etiqueta)</label>
                                <input type="text" class="form-control" id="campo-etiqueta" placeholder="Agregar tag de referencia (max. 15 caracteres)" required maxlength="15">
                            </div>
                            <div class="col-md-6">
                                <label for="campo-estado" class="form-label fw-bold small">Estado</label>
                                <select class="form-select" id="campo-estado">
                                    <option value="Pendiente">Pendiente</option>
                                    <option value="En Proceso">En Proceso</option>
                                    <option value="Pausada">Pausada</option>
                                    <option value="Finalizada">Finalizada</option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer px-0 pb-0 pt-3">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-mi-color" id="boton-guardar-tarea">Guardar Tarea</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
